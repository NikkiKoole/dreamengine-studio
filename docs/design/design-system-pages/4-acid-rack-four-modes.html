    var p = document.body || document.documentElement;

      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ffec27;padding:2px 6px;\">A<\u002Fspan><span style=\"background:#1d2b53;color:#8fa0c0;padding:3px 6px;\">B<\u002Fspan><span style=\"background:#1d2b53;color:#8fa0c0;padding:3px 6px;\">C<\u002Fspan><span style=\"background:#1d2b53;color:#8fa0c0;padding:3px 6px;\">D<\u002Fspan><div style=\"display:flex;gap:2px;flex:1;height:12px;\"><sc-for list=\"{{ song }}\" as=\"s\" hint-placeholder-count=\"14\"><div style=\"{{ s.style }}\"><\u002Fdiv><\u002Fsc-for><\u002Fdiv><span style=\"background:#1d2b53;color:#8fa0c0;padding:3px 6px;\">GEN<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n   <div style=\"font-family:system-ui,sans-serif;font-size:13px;line-height:1.5;color:#a89a90;max-width:480px;\">Still roomy, but tall. One focused editor over a track list of collapsed strips — tap a strip to swap focus. Seq + transport pinned; the piano roll gets the height a portrait screen affords.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ iPHONE LANDSCAPE · TABS ============ -->\n  <div style=\"display:flex;flex-direction:column;gap:14px;\">\n   <div style=\"display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;\">\n    <div style=\"font-size:15px;color:#fff1e8;letter-spacing:1px;\">iPHONE · LANDSCAPE<\u002Fdiv>\n    <div style=\"font-size:12px;color:#a28879;\">416×192 · 2× · ~2:1<\u002Fdiv>\n    <div style=\"font-size:11px;color:#1c110d;background:#ffa300;padding:2px 7px;border-radius:2px;\">TABS<\u002Fdiv>\n   <\u002Fdiv>\n   <div style=\"background:#0a0807;border-radius:26px;padding:11px 13px;border:1px solid #2a1c16;box-shadow:0 24px 60px rgba(0,0,0,.5);\">\n    <div style=\"width:832px;height:384px;background:#000;overflow:hidden;display:flex;gap:6px;padding:7px;font-size:12px;color:#c2c3c7;\">\n     <!-- left rail: transport + tabs -->\n     <div style=\"width:120px;flex-shrink:0;display:flex;flex-direction:column;gap:5px;\">\n      <div style=\"display:flex;align-items:center;gap:6px;\"><span style=\"background:#00e436;color:#0a0807;padding:4px 8px;border-radius:2px;\">▶ RUN<\u002Fspan><\u002Fdiv>\n      <div style=\"color:#a28879;font-size:10px;\">128 · bank B<\u002Fdiv>\n      <div style=\"height:1px;background:#2a1c16;margin:2px 0;\"><\u002Fdiv>\n      <sc-for list=\"{{ tabs }}\" as=\"t\" hint-placeholder-count=\"5\"><div style=\"{{ t.style }}\">{{ t.name }}<\u002Fdiv><\u002Fsc-for>\n     <\u002Fdiv>\n     <!-- main: focused 303-A -->\n     <div style=\"flex:1;display:flex;flex-direction:column;gap:5px;min-width:0;\">\n      <div style=\"display:flex;align-items:center;gap:8px;flex-shrink:0;\"><span style=\"color:#ff77a8;\">303-A<\u002Fspan><span style=\"background:#1d2b53;color:#8fa0c0;padding:1px 7px;\">fx<\u002Fspan><span style=\"flex:1;\"><\u002Fspan><span style=\"color:#00e436;\">▶ PLAYING<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:6px;flex-shrink:0;\"><sc-for list=\"{{ knobs }}\" as=\"k\" hint-placeholder-count=\"7\"><div style=\"display:flex;flex-direction:column;align-items:center;gap:3px;flex:1;\"><div style=\"position:relative;width:60%;aspect-ratio:1;border-radius:50%;background:#1d2b53;border:2px solid #0b1430;\"><div style=\"{{ k.pointer }}\"><\u002Fdiv><\u002Fdiv><div style=\"font-size:9px;color:#c2c3c7;\">{{ k.l }}<\u002Fdiv><\u002Fdiv><\u002Fsc-for><\u002Fdiv>\n      <div style=\"position:relative;flex:1;min-height:60px;display:flex;flex-direction:column;background:#000;border:1px solid #150e0a;border-radius:3px;\"><sc-for list=\"{{ pianoRows }}\" as=\"row\" hint-placeholder-count=\"6\"><div style=\"display:grid;grid-template-columns:repeat(16,1fr);flex:1;\"><sc-for list=\"{{ row }}\" as=\"c\" hint-placeholder-count=\"16\"><div style=\"{{ c.style }}\"><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fsc-for><div style=\"position:absolute;top:0;bottom:0;left:31.25%;width:6.25%;background:#fff1e8;animation:ph 1s steps(2) infinite;\"><\u002Fdiv><\u002Fdiv>\n      <!-- pinned seq -->\n      <div style=\"flex-shrink:0;border:1px solid #422136;border-radius:3px;background:#000;padding:5px;\"><div style=\"display:flex;align-items:center;gap:6px;margin-bottom:4px;\"><span style=\"color:#ffec27;font-size:9px;\">SEQ<\u002Fspan><span style=\"color:#5f574f;font-size:8px;\">pinned<\u002Fspan><\u002Fdiv><div style=\"display:grid;grid-template-columns:repeat(16,1fr);gap:2px;height:14px;\"><sc-for list=\"{{ seqCells }}\" as=\"c\" hint-placeholder-count=\"16\"><div style=\"{{ c.style }}\"><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n     <\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n   <div style=\"font-family:system-ui,sans-serif;font-size:13px;line-height:1.5;color:#a89a90;max-width:640px;\">Wide but short. Transport + machine tabs in a left rail; one machine's full editor fills the middle. Tap a tab to swap — the seq lane stays pinned below.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ============ iPHONE PORTRAIT · ACCORDION ============ -->\n  <div style=\"display:flex;flex-direction:column;gap:14px;\">\n   <div style=\"display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;\">\n    <div style=\"font-size:15px;color:#fff1e8;letter-spacing:1px;\">iPHONE · PORTRAIT<\u002Fdiv>\n    <div style=\"font-size:12px;color:#a28879;\">192×416 · 2× · ~1:2<\u002Fdiv>\n    <div style=\"font-size:11px;color:#1c110d;background:#ff77a8;padding:2px 7px;border-radius:2px;\">ACCORDION<\u002Fdiv>\n   <\u002Fdiv>\n   <div style=\"background:#0a0807;border-radius:30px;padding:14px 12px;border:1px solid #2a1c16;box-shadow:0 24px 60px rgba(0,0,0,.5);\">\n    <div style=\"width:384px;height:832px;background:#000;overflow:hidden;display:flex;flex-direction:column;gap:7px;padding:8px;font-size:13px;color:#c2c3c7;\">\n     <!-- transport -->\n     <div style=\"display:flex;align-items:center;gap:5px;flex-shrink:0;font-size:11px;\"><span style=\"background:#1d2b53;color:#00e436;padding:4px 8px;\">▶<\u002Fspan><span style=\"background:#000;color:#fff1e8;border:1px solid #1d2b53;padding:4px 7px;\">128<\u002Fspan><span style=\"color:#a28879;\">B<\u002Fspan><span style=\"flex:1;\"><\u002Fspan><span style=\"border:2px solid #ffa300;color:#ffec27;padding:3px 8px;\">A<\u002Fspan><span style=\"background:#1d2b53;color:#8fa0c0;padding:4px 8px;\">B<\u002Fspan><span style=\"background:#1d2b53;color:#8fa0c0;padding:4px 8px;\">C<\u002Fspan><span style=\"background:#1d2b53;color:#8fa0c0;padding:4px 8px;\">D<\u002Fspan><\u002Fdiv>\n     <!-- accordion: 303-A open (ring) -->\n     <div style=\"border:2px solid #ffa300;border-radius:3px;background:#140d0a;padding:8px;display:flex;flex-direction:column;gap:7px;flex-shrink:0;\">\n      <div style=\"display:flex;align-items:center;\"><span style=\"color:#ff77a8;\">▾ 303-A<\u002Fspan><span style=\"flex:1;\"><\u002Fspan><span style=\"background:#1d2b53;color:#8fa0c0;padding:2px 8px;\">fx<\u002Fspan><\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:8px;\"><sc-for list=\"{{ knobs }}\" as=\"k\" hint-placeholder-count=\"7\"><div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;\"><div style=\"position:relative;width:62%;aspect-ratio:1;border-radius:50%;background:#1d2b53;border:3px solid #0b1430;\"><div style=\"{{ k.pointer }}\"><\u002Fdiv><\u002Fdiv><div style=\"font-size:11px;color:#c2c3c7;\">{{ k.l }}<\u002Fdiv><\u002Fdiv><\u002Fsc-for><div style=\"display:flex;flex-direction:column;align-items:center;gap:4px;justify-content:center;\"><div style=\"width:62%;aspect-ratio:1;border:3px solid #ffec27;color:#ffec27;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;\">SAW<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n     <\u002Fdiv>\n     <!-- collapsed rows with activity dots -->\n     <sc-for list=\"{{ collapsed }}\" as=\"t\" hint-placeholder-count=\"4\"><div style=\"display:flex;align-items:center;gap:10px;background:#0c0a09;border:1px solid #2a1c16;border-radius:3px;padding:9px 10px;flex-shrink:0;\"><span style=\"color:#6f5f64;\">▸<\u002Fspan><span style=\"flex:1;color:{{ t.color }};\">{{ t.name }}<\u002Fspan><span style=\"{{ t.dotStyle }}\"><\u002Fspan><\u002Fdiv><\u002Fsc-for>\n     <div style=\"flex:1;\"><\u002Fdiv>\n     <!-- pinned seq -->\n     <div style=\"flex-shrink:0;border:1px solid #422136;border-radius:3px;background:#000;padding:7px;\"><div style=\"display:flex;align-items:center;gap:6px;margin-bottom:5px;\"><span style=\"color:#ffec27;font-size:11px;\">SEQ<\u002Fspan><span style=\"color:#5f574f;font-size:9px;\">303-A · pinned<\u002Fspan><\u002Fdiv><div style=\"display:grid;grid-template-columns:repeat(16,1fr);gap:2px;height:22px;\"><sc-for list=\"{{ seqCells }}\" as=\"c\" hint-placeholder-count=\"16\"><div style=\"{{ c.style }}\"><\u002Fdiv><\u002Fsc-for><\u002Fdiv><\u002Fdiv>\n     <!-- bottom bar -->\n     <div style=\"display:flex;gap:6px;height:34px;flex-shrink:0;\"><div style=\"flex:1;background:#1d2b53;color:#ffec27;display:flex;align-items:center;justify-content:center;border-radius:2px;\">SONG<\u002Fdiv><div style=\"flex:1;background:#1d2b53;color:#8fa0c0;display:flex;align-items:center;justify-content:center;border-radius:2px;\">GEN<\u002Fdiv><div style=\"flex:1;background:#1d2b53;color:#8fa0c0;display:flex;align-items:center;justify-content:center;border-radius:2px;\">WAV<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n   <div style=\"font-family:system-ui,sans-serif;font-size:13px;line-height:1.5;color:#a89a90;max-width:384px;\">Finger is ~⅑ of the width — can't open all. So: one machine expanded (knobs in a 4-grid), the rest collapse to tappable rows with · activity dots. Seq lane still pinned; SONG/GEN/WAV floor bar swaps the view.<\u002Fdiv>\n  <\u002Fdiv>\n\n <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    const C = { pink:'#ff77a8', orange:'#ffa300', yellow:'#ffec27', green:'#00e436', red:'#ff004d',\n      blue:'#29adff', indigo:'#83769c', white:'#fff1e8', lgry:'#c2c3c7' };\n\n    // knobs\n    const kd = [['CUT',-30],['RES',20],['ENV',-52],['DEC',40],['ACC',12],['DRV',62],['SQL',34]];\n    const knobs = kd.map(([l,a]) => ({ l, pointer:{ position:'absolute', left:'50%', top:'12%',\n      width:'2px', height:'40%', marginLeft:'-1px', background:'#fff1e8', transformOrigin:'bottom center',\n      transform:`rotate(${a}deg)` } }));\n\n    // pinned seq lane (303 line) — playhead at 5, accents red\n    const on = [0,3,6,8,11,13], acc = [3,11], ph = 5;\n    const seqCells = Array.from({ length:16 }, (_, s) => {\n      let bg;\n      if (s === ph) bg = C.white;\n      else if (acc.includes(s)) bg = C.red;\n      else if (on.includes(s)) bg = C.orange;\n      else bg = (s % 4 === 0) ? '#1e1116' : '#140b0f';\n      return { style:{ background:bg, borderRadius:'1px' } };\n    });\n\n    // drum lanes\n    const mkLane = (pat, color) => pat.split('').map((ch,s) => ({ style:{\n      background: ch !== '.' ? color : (s % 4 === 0 ? '#1e1116' : '#140b0f'), borderRadius:'1px' } }));\n    const lane909 = mkLane('9...9...9...9...', C.orange);\n    const lane808 = mkLane('..8...8...8.8...', C.yellow);\n\n    // master faders\n    const master = [['TIME',.6],['FB',.4],['GLU',.75],['PCF',.5],['RES',.3]].map(([l,v]) => ({\n      l, fill:{ width:'100%', height:(v*100)+'%', background:C.indigo, borderRadius:'3px' } }));\n\n    // piano roll\n    const notes = [{p:0,acc:1},{p:null},{p:3},{p:0,acc:1},{p:5},{p:null},{p:2,acc:1},{p:0},\n      {p:7},{p:null},{p:4,acc:1},{p:0},{p:5},{p:2,acc:1},{p:7,acc:1},{p:0}];\n    const pianoRows = [];\n    for (let r=0; r<6; r++) {\n      const pitch = 7 - r; const row = [];\n      for (let s=0; s<16; s++) {\n        const n = notes[s]; const hit = n.p === pitch;\n        row.push({ style:{ background: hit ? (n.acc ? C.red : C.orange) : (s%4===0 ? '#0a0e1c' : '#000'),\n          borderRight:'1px solid #150e0a', borderBottom:'1px solid #150e0a' } });\n      }\n      pianoRows.push(row);\n    }\n\n    // collapsed tracks with activity dots + mini strips\n    const cdef = [['303-B',C.pink,'x.x.x..x.x..x.x.',true],['909',C.orange,'x...x...x...x...',true],\n      ['808',C.yellow,'..x...x...x...x.',true],['MASTER',C.indigo,'xxxxxxxxxxxxxxxx',true]];\n    const collapsed = cdef.map(([name,color,pat,active]) => ({\n      name, color,\n      strip: pat.split('').map((ch,s) => ({ style:{ flex:1, height:'100%', borderRadius:'1px',\n        background: ch !== '.' ? color : (s%4===0 ? '#2a171d' : '#1a0f13') } })),\n      dotStyle:{ width:'8px', height:'8px', borderRadius:'50%', flexShrink:0,\n        background: active ? C.green : '#4a3a40' }\n    }));\n\n    // tabs (TABS mode) — 303-A active (ring)\n    const tdef = [['303-A',C.pink,1],['303-B',C.pink,0],['909',C.orange,0],['808',C.yellow,0],['MST',C.indigo,0]];\n    const tabs = tdef.map(([name,c,a]) => ({ name, style:{ padding:'8px 0', textAlign:'center',\n      borderRadius:'3px', fontSize:'11px', border:'2px solid '+(a?c:'#2a1c16'),\n      background:'#0c0a09', color:a?c:'#6f5f54' } }));\n\n    // song blocks\n    const seq = ['A','A','B','A','C','C','D'];\n    const cm = { A:C.orange, B:C.green, C:C.blue, D:C.red };\n    const song = [];\n    for (let i=0; i<14; i++) song.push({ style:{ flex:1, height:'100%', borderRadius:'1px',\n      background: i < seq.length ? cm[seq[i]] : '#221316' } });\n\n    return { knobs, seqCells, lane909, lane808, master, pianoRows, collapsed, tabs, song };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
