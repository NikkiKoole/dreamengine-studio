<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dreamengine</title>
  </head>
  <body>

    <div id="topbar">
      <span id="logo">dreamengine</span>
      <div id="tabs">
        <button class="tab active" data-tab="code"    tabindex="-1">code</button>
        <button class="tab"        data-tab="sprites" tabindex="-1">sprites</button>
        <button class="tab"        data-tab="sound"   tabindex="-1" disabled>sound</button>
        <button class="tab"        data-tab="map"     tabindex="-1" disabled>map</button>
        <button class="tab"        data-tab="help"     tabindex="-1">help</button>
        <button class="tab"        data-tab="settings" tabindex="-1">settings</button>
      </div>
      <button id="run-btn" tabindex="-1">▶ run</button>
    </div>

    <div id="build-log"></div>

    <div id="panels">

      <div id="panel-code" class="panel active">
        <div id="editor"></div>
      </div>

      <div id="panel-sprites" class="panel">
        <div class="whole">
          <div class="topbar">
            <h>brush</h>
            <div class="slidecontainer">
              <input type="range" min="1" max="10" value="1" class="slider" id="brushRange">
            </div>
            <input id="brushInput" type="number" min="1" max="64" value="1">
            <h>sprite</h>
            <input id="cellwidth"  type="number" min="1">
            <input id="cellheight" type="number" min="1">
            <h>zoom</h>
            <div class="slidecontainer">
              <input type="range" min="1" max="5" value="4" class="slider" id="zoomRange">
            </div>
          </div>
          <div class="swatches-and-canvas">
            <div class="swatches"></div>
            <div class="canvascontainer">
              <canvas id="sprite-canvas"         class="blocked-background"></canvas>
              <canvas id="sprite-canvas-tmp"></canvas>
              <canvas id="sprite-canvas-overlay"></canvas>
            </div>
          </div>
          <div class="actions">
            <button id="pixel">pixel</button>
            <button id="fill">fill</button>
            <button id="selection">select</button>
            <button id="stamp">stamp</button>
            <button id="linetool">line</button>
          </div>
          <div class="tilemap">
            <canvas id="tilemap-canvas"         class="blocked-background"></canvas>
            <canvas id="tilemap-canvas-overlay"></canvas>
          </div>
          <div class="slidecontainer smaller">
            <input type="range" min="1" max="4" value="2" class="slider" id="zoomRangeTilemap">
          </div>
        </div>
        <div class="frames-and-plus">
          <div class="frames-list"></div>
        </div>
        <div class="help-area">
          <button id="help-button">?</button>
          <div id="help-text">
            <b>keyboard shortcuts</b><br><br>
            <b>[← ↑ → ↓]</b> shift drawing<br>
            <b>[1]</b> prev frame &nbsp; <b>[2]</b> next<br>
            <b>[3]</b> add empty &nbsp; <b>[4]</b> duplicate<br>
            <b>[d]</b> delete frame<br>
            <b>[h]</b> flip horizontal<br>
            <b>[v]</b> flip vertical<br>
            <b>[r]</b> rotate 90°<br>
            <b>[p]</b> pencil &nbsp; <b>[f]</b> fill<br>
            <b>[s]</b> select &nbsp; <b>[l]</b> line tool<br>
          </div>
        </div>
      </div>

      <div id="panel-help" class="panel"></div>
      <div id="panel-settings" class="panel"></div>

    </div>

    <script type="module" src="/src/shell.js"></script>
  </body>
</html>
