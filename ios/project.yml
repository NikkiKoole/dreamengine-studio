# xcodegen spec — the ONLY hand-edited project file. `./build.sh` regenerates the
# .xcodeproj from this (never open Xcode to manage files). Add a target / source
# folder here; commit this, never the generated .xcodeproj (it's .gitignore'd).
name: TinyjamHello
options:
  bundleIdPrefix: com.tinyjam
  deploymentTarget:
    iOS: "15.0"
targets:
  TinyjamHello:
    type: application
    platform: iOS
    # Phase 2: the REAL dreamengine. The app compiles studio.c + raylib_compat.c (the
    # DE_NO_RAYLIB software path) + whatever is staged in gen/app/ — NOT the spike
    # stand-ins canvas.c/audio.c (excluded; they're unused now that the real engine
    # replaced them — no target still compiles them). gen/app is a DIRECTORY source so it
    # works for both shapes: a single cart (gen/app/cart.c, staged by play.js) OR a
    # MULTI-CART app (app_main.c dispatcher + per-cart <slug>.c wrappers, staged by
    # `build-app.js --ios`). build.sh / device.sh with APP=<name> pick the multi-cart path.
    sources:
      # Tinyjam.storekit is GENERATED from the app manifest into gen/app (build-app.js --ios);
      # exclude the hand-authored Sources copy so it isn't bundled twice.
      - path: Sources
        excludes: [canvas.c, canvas.h, audio.c, audio.h, Tinyjam.storekit]
      - path: ../runtime/studio.c
      - path: ../runtime/raylib_compat.c
      - path: gen/app
      # Per-app icon, staged by build-app.js --ios from the manifest's "icon" key (absent for
      # single-cart builds — optional means xcodegen just skips it then).
      - path: gen/Assets.xcassets
        optional: true
    dependencies:
      - target: TinyjamAU       # embed the AUv3 extension into the app's PlugIns
        embed: true
    # NOTE: the app-group entitlement is re-added once the group is registered for automatic
    # provisioning. It blocks plain device signing until then, and the AppGroup UserDefaults
    # suite works without it. (Was: application-groups group.com.tinyjam.)
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        # com.tinyjam.hello is the DEV-LOOP identity (throwaway, Xcode-auto-registered). The
        # SHIPPING id is apps/tinyjam/app.json's bundleId = com.mipolai.tinyjam — registered
        # manually in the developer portal + reserved on App Store Connect (2026-07-06). A
        # store/TestFlight build must set PRODUCT_BUNDLE_IDENTIFIER to that (extension:
        # com.mipolai.tinyjam.TinyjamAU) — don't ship the hello id.
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyjam.hello
        # Inert unless gen/Assets.xcassets was staged (see sources) — no catalog, no actool run.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # no in-app encryption beyond OS-provided → auto-answers the ASC export-compliance
        # question, so TestFlight builds go straight to "Ready to Test" after processing
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        # device-adaptive Phase 2: allow rotation. layoutSubviews fires on rotate → de_resize reflows
        # a resizable cart to the new shape for free. (Fixed carts just re-letterbox in the new bounds.)
        # all four incl. upside-down: App Store validation REQUIRES the full set when the app
        # targets iPad (multitasking rule) — upload rejects otherwise (hit 2026-07-06)
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        "INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad": "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Bridging-Header.h
        # the engine sees its headers (runtime/) + the staged cart data (gen/app/)
        HEADER_SEARCH_PATHS: [$(SRCROOT)/../runtime, $(SRCROOT)/gen/app, $(SRCROOT)/Sources]
        # StoreKit LOCAL testing is SIMULATOR-ONLY: StoreKitTest.framework pulls in XCTest,
        # which isn't present in a plain app launch (esp. on a real device → dyld crash). So
        # link it + add the platform Developer-frameworks rpath ONLY for the simulator SDK; the
        # device build stays clean (device IAP testing = App Store Connect sandbox, later).
        "OTHER_LDFLAGS[sdk=iphonesimulator*]": [-framework, StoreKitTest]
        "LD_RUNPATH_SEARCH_PATHS[sdk=iphonesimulator*]": [$(inherited), $(PLATFORM_DIR)/Developer/Library/Frameworks]
        # omnichord: 320x200, SCALE=1 so UIKit touches map 1:1 to framebuffer pixels
        GCC_PREPROCESSOR_DEFINITIONS: [$(inherited), DE_NO_RAYLIB=1, SCREEN_W=320, SCREEN_H=200, SCALE=1, MAP_W=128, MAP_H=64, CELL_W=16, CELL_H=16]
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
  TinyjamAU:
    type: app-extension
    platform: iOS
    # The AUv3 rack hosts the REAL engine (not the spike arpeggio): studio.c + raylib_compat.c
    # + a keybed instrument cart (gen/au/cart.c = epiano). TinyjamAU.swift's render block feeds
    # host MIDI (de_midi_event) → the cart's keybed plays it, sample-clocks de_frame() (the
    # sequencer/voice bookkeeping), and pulls de_audio_render() — same engine the app runs.
    sources:
      - AU
      - ../runtime/studio.c
      - ../runtime/raylib_compat.c
      - gen/au/cart.c
    settings:
      base:
        GENERATE_INFOPLIST_FILE: NO
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyjam.hello.TinyjamAU
        SWIFT_OBJC_BRIDGING_HEADER: AU/AU-Bridging-Header.h
        HEADER_SEARCH_PATHS: [$(SRCROOT)/../runtime, $(SRCROOT)/gen/au, $(SRCROOT)/Sources]
        GCC_PREPROCESSOR_DEFINITIONS: [$(inherited), DE_NO_RAYLIB=1, SCREEN_W=320, SCREEN_H=200, SCALE=1, MAP_W=128, MAP_H=64, CELL_W=16, CELL_H=16]
        MARKETING_VERSION: "0.1"
        CURRENT_PROJECT_VERSION: "1"
    info:
      path: AU/Info.plist
      properties:
        CFBundleDisplayName: Tinyjam Demo
        NSExtension:
          NSExtensionPointIdentifier: com.apple.AudioUnit
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).TinyjamAUFactory
          NSExtensionAttributes:
            AudioComponentBundle: $(PRODUCT_BUNDLE_IDENTIFIER)
            AudioComponents:
              - type: aumu
                subtype: tnyj
                manufacturer: Tnyj
                name: "Tinyjam: Demo"
                version: 1
                sandboxSafe: true
                tags:
                  - Synthesizer
  TinyjamHelloTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies:
      - target: TinyjamHello
      - sdk: StoreKitTest.framework
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.tinyjam.hello.tests
schemes:
  TinyjamHello:
    build:
      targets:
        TinyjamHello: all
    run: {}
    test:
      targets:
        - TinyjamHelloTests
