# render.yaml — Render "blueprint" for the lockstep-netplay relay
# (tools/net-relay.js; docs/design/multiplayer-research.md §"Hosting beyond the LAN").
#
# One-time setup: create a Render account → New → Blueprint → point it at this
# GitHub repo → it finds this file and deploys the relay. You get a
# wss://<name>.onrender.com endpoint for published multiplayer carts:
#
#   https://nikkikoole.github.io/dreamengine/<cart>/?room=<code>&relay=wss://<name>.onrender.com
#
# Free-tier caveat: the service SLEEPS after ~15 idle minutes; the first
# connection takes ~30–60 s to wake it. Warm it before a play session by
# opening https://<name>.onrender.com/ in a browser (the relay answers a
# plain-text 200 there for exactly this).
services:
  - type: web
    name: dreamengine-relay
    runtime: node
    region: frankfurt          # EU — lockstep is latency-sensitive; keep the hop short
    plan: free
    # override the default `npm install`: the relay is ZERO-dependency, and the
    # root package.json's sharp (a native module, used by other repo tools)
    # would otherwise be built for nothing on every deploy
    buildCommand: echo "relay is zero-dep — no build"
    startCommand: node tools/net-relay.js --port $PORT
    autoDeploy: false          # the relay rarely changes; redeploy by hand when it does
