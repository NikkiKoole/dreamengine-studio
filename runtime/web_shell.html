<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <!-- "Add to Home Screen" on iOS launches the cart standalone: no URL bar, true
       fullscreen — the only fullscreen path on iPhone (no Fullscreen API there) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1b1c1f">
  <title>dreamengine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #1b1c1f;
                 overscroll-behavior: none;      /* no pull-to-refresh */
                 /* the suppression set must cover body too, not just the canvas:
                    iOS treats a held finger (a piano key!) as a long-press and
                    shows its little grey magnifier loupe / tap-highlight circle
                    unless the page is marked unselectable + highlight-free */
                 touch-action: none;
                 -webkit-user-select: none;
                 user-select: none;
                 -webkit-touch-callout: none;
                 -webkit-tap-highlight-color: transparent; }
    body { display: flex; justify-content: center; align-items: center; }
    #canvas {
      display: block;
      image-rendering: pixelated;
      /* canvas is sized by Raylib to SCREEN_W*SCALE × SCREEN_H*SCALE */
      max-width: 100%;
      max-height: 100%;
      /* keep iOS Safari from hijacking touches as scroll / pinch-zoom /
         double-tap-zoom / long-press-callout — the cart wants them raw */
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      -webkit-tap-highlight-color: transparent;
    }
  </style>
</head>
<body>
  <canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>
  <div id="rotate-hint" style="display:none; position:fixed; top:12px; left:50%; transform:translateX(-50%);
       background:#25262b; color:#e8e6e3; border:1px solid #ff6c24; border-radius:8px;
       padding:8px 14px; font:13px ui-monospace,Menlo,monospace; pointer-events:none;">&#8635; rotate your phone</div>
  <button id="fs" title="fullscreen" style="position:fixed; right:10px; bottom:10px; width:34px; height:34px;
       background:#25262b; color:#9a948c; border:1px solid #34353b; border-radius:8px;
       font:16px ui-monospace,Menlo,monospace; cursor:pointer; opacity:.6;">&#x26F6;</button>
  <div id="roombar" style="display:none; position:fixed; top:10px; right:10px; z-index:6;
       background:#25262b; color:#9a948c; border:1px solid #34353b; border-radius:8px;
       padding:6px 10px; font:12px ui-monospace,Menlo,monospace;"></div>
  <script>
    // multiplayer room bar (netplay rung 5b — design/multiplayer-research.md).
    // With ?room= the page URL *is* the invite: show the code + a copy button
    // (text on the canvas can't be selected) — the HOST sends this so the joiner
    // lands in the SAME room. Without one, offer "play together" — a HOST/JOIN
    // split (both blindly minting a random room was the old "wrong room" bug),
    // shown only when manifest.json says the cart is 2P (a `players` field
    // build-site.js stamps in; absent → fetch fails silent → bar stays hidden,
    // so the editor's build-web preview is unaffected).
    (function () {
      var RELAY = 'dreamengine-relay.onrender.com';
      var bar = document.getElementById('roombar');
      var room = new URLSearchParams(location.search).get('room');
      var relaySuffix = (location.host !== RELAY ? '&relay=wss://' + RELAY : '');
      function mkbtn(label) {
        var b = document.createElement('button');
        b.textContent = label;
        b.setAttribute('style', 'background:transparent; border:1px solid #06b5e0; color:#06b5e0;' +
          'font:inherit; padding:2px 8px; border-radius:6px; cursor:pointer;');
        return b;
      }
      // HOST/JOIN dialog — one player hosts (mints a room, sends the link), the
      // other joins with that link/code. Ends the "we both picked random rooms".
      function playDialog() {
        var ov = document.createElement('div');
        ov.setAttribute('style', 'position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:20;' +
          'display:flex; align-items:center; justify-content:center; font:14px ui-monospace,Menlo,monospace;');
        var box = document.createElement('div');
        box.setAttribute('style', 'background:#25262b; color:#e8e6e3; border:1px solid #34353b;' +
          'border-radius:12px; padding:20px; max-width:320px; width:90%;');
        var mk = function (label, color) {
          var b = document.createElement('button'); b.textContent = label;
          b.setAttribute('style', 'width:100%; box-sizing:border-box; padding:9px; border-radius:8px;' +
            'border:1px solid ' + color + '; background:transparent; color:' + color + '; font:inherit; cursor:pointer;');
          return b;
        };
        var sub = document.createElement('div');
        sub.textContent = 'One of you hosts and sends the invite link. The other joins with it.';
        sub.setAttribute('style', 'color:#9a948c; font-size:12px; margin-bottom:14px; line-height:1.4;');
        var host = mk('🎮 Host a game', '#06b5e0'); host.style.marginBottom = '10px';
        // JOIN uses the native prompt() — a running emscripten build installs global
        // key handlers that swallow keystrokes to an HTML <input>, so an inline field
        // is unusable on the cart page; prompt() is an OS dialog emscripten can't touch.
        var join = mk('🔑 Join a game', '#7ee6a0'); join.style.marginBottom = '14px';
        var cancel = mk('cancel', '#9a948c'); cancel.style.border = 'none';
        box.appendChild(sub); box.appendChild(host); box.appendChild(join); box.appendChild(cancel);
        ov.appendChild(box); document.body.appendChild(ov);
        var close = function () { ov.remove(); };
        ov.addEventListener('click', function (e) { if (e.target === ov) close(); });
        cancel.onclick = close;
        host.onclick = function () {
          var c = Math.random().toString(36).replace(/[^a-z0-9]/g, '').slice(0, 4) || 'play';
          location.href = '?room=' + c + relaySuffix;
        };
        join.onclick = function () {
          var v = prompt('Paste the invite link or room code your friend sent:');
          if (v === null) return;   // cancelled
          v = v.trim(); if (!v) return;
          if (/^https?:\/\//i.test(v)) { location.href = v; return; }   // full link — go as-is
          var m = v.match(/[?&]room=([a-z0-9]+)/i);
          var c = m ? m[1] : v.replace(/[^a-z0-9]/gi, '').slice(0, 16);
          if (c) location.href = '?room=' + c + relaySuffix;
        };
      }
      if (room) {
        bar.style.display = 'block';
        var code = document.createElement('span');
        code.textContent = 'room ' + room + ' ';
        var b = mkbtn('copy invite link');
        b.onclick = function () {
          var link = location.href;   // relay param (when needed) is already in it
          (navigator.clipboard ? navigator.clipboard.writeText(link)
                               : Promise.reject()).then(function () {
            b.textContent = 'copied!';
            setTimeout(function () { b.textContent = 'copy invite link'; }, 1500);
          }).catch(function () { prompt('invite link:', link); });
        };
        var hint = document.createElement('div');
        hint.textContent = 'send this link to a friend to join';
        hint.setAttribute('style', 'color:#6c6b73; font-size:10px; margin-top:3px;');
        bar.appendChild(code); bar.appendChild(b); bar.appendChild(hint);
      } else {
        fetch('manifest.json').then(function (r) { return r.json(); }).then(function (m) {
          if (!m || !(m.players >= 2)) return;
          bar.style.display = 'block';
          var b = mkbtn('👥 play together');
          b.onclick = playDialog;
          bar.appendChild(b);
        }).catch(function () {});
      }
    })();
  </script>
  <script>
    var Module = { canvas: document.getElementById('canvas') };
    // device touch ceiling, read by the engine's touch_ceiling() via EM_JS.
    // iOS cancels ALL touches when a finger lands past the ceiling (5 on
    // iPhone), so carts size chords/holds to this budget. The detection traps
    // (docs/design/mobile-web-notes.md §5): navigator.maxTouchPoints reports 5
    // on BOTH iPhone and iPad (the iPad really tracks ~10), and since iPadOS 13
    // the iPad's UA pretends to be a desktop Mac — the tell is a "Mac" with
    // touch points. Android digitizers report truthfully; desktop is 0.
    Module.deTouchCeiling = (function () {
      var ua = navigator.userAgent, mtp = navigator.maxTouchPoints || 0;
      if (/iPhone|iPod/.test(ua)) return 5;
      if (/iPad/.test(ua) || (/Macintosh/.test(ua) && mtp > 1)) return 10;
      return mtp;
    })();
    // landscape cart viewed in portrait on a touch device? show a gentle hint.
    // checked at runtime (canvas is sized by Raylib at boot) so a portrait-shaped
    // cart never nags. hint only — we never CSS-rotate the canvas, because the
    // GLFW shim maps touch/mouse from the bounding rect and a transform breaks it.
    function rotateHint() {
      var c = Module.canvas, h = document.getElementById('rotate-hint');
      var portrait = window.innerHeight > window.innerWidth;
      var coarse   = window.matchMedia('(pointer: coarse)').matches;  // touch device
      h.style.display = (coarse && portrait && c.width > c.height) ? 'block' : 'none';
    }
    window.addEventListener('resize', rotateHint);
    setTimeout(rotateHint, 1000);  // after Raylib has sized the canvas
    // fullscreen button — desktop/Android/iPad. iPhone Safari has no Fullscreen
    // API for canvas, so the button hides itself there (home-screen install is
    // the iPhone path, via the apple-mobile-web-app meta above).
    var fsBtn = document.getElementById('fs');
    if (!(document.fullscreenEnabled || document.webkitFullscreenEnabled)) {
      fsBtn.style.display = 'none';
    } else fsBtn.addEventListener('click', function () {
      var d = document, el = d.documentElement;
      if (d.fullscreenElement || d.webkitFullscreenElement)
        (d.exitFullscreen || d.webkitExitFullscreen).call(d);
      else
        (el.requestFullscreen || el.webkitRequestFullscreen).call(el);
    });
    // emscripten's GLFW shim (-s USE_GLFW=3) drops mouse events whose target isn't
    // the canvas, and its own capture call (event.target.setCapture()) is a legacy
    // Firefox/IE API that throws on Chrome/Safari. Without capture, a drag released
    // outside the canvas loses its mouseup: mouse_released() never fires and
    // mouse_down() sticks. Capturing the pointer retargets the release to the canvas.
    Module.canvas.addEventListener('pointerdown', function (e) {
      try { Module.canvas.setPointerCapture(e.pointerId); } catch (err) {}
    });
    // touch mirror — the engine reads contacts from Module.deTouches instead of
    // raylib's web touch list (docs/design/touch-notes.md §7). Emscripten reports
    // touchend with remaining+lifted touches conflated (emscripten#4679, wontfix)
    // and raylib removes at most ONE point per event — so releasing two fingers in
    // the same instant left a phantom contact stuck in the list. The DOM's
    // event.touches is spec-correct in every browser: exactly the fingers that are
    // down, on every event. So we REBUILD the list each event instead of counting
    // up/down. Flat [id, x, y] triples, in canvas pixels (canvas.width / CSS width
    // — the same mapping raylib's own handler uses; no HIGHDPI flag is set, so
    // canvas.width == GetScreenWidth()).
    Module.deTouches = [];
    ['touchstart', 'touchmove', 'touchend', 'touchcancel'].forEach(function (ev) {
      Module.canvas.addEventListener(ev, function (e) {
        var c = Module.canvas, rect = c.getBoundingClientRect();
        if (!rect.width || !rect.height) return;
        var out = [];
        for (var i = 0; i < e.touches.length; i++) {
          var t = e.touches[i];
          if (t.target !== c) continue;   // a finger on the fullscreen button is not a cart touch
          out.push(t.identifier,
                   (t.clientX - rect.left) * (c.width / rect.width),
                   (t.clientY - rect.top) * (c.height / rect.height));
        }
        Module.deTouches = out;
      }, { passive: true });
    });
    // debug overlay LOADER (mobile-web-notes §6d) — the overlay logic lives in
    // ONE site-root file (../debug-overlay.js) so improving it never needs a
    // cart rebuild; only this loader is baked. Open with ?debug=1 or by
    // triple-tapping/clicking the top-left corner; same gesture toggles off.
    // Fails silent where the file isn't served (editor build-web preview).
    (function () {
      function openOverlay() {
        if (window.deDebug) { window.deDebug.toggle(); return; }
        var s = document.createElement('script');
        s.src = '../debug-overlay.js';
        s.onerror = function () { console.warn('debug-overlay.js not found here'); };
        document.body.appendChild(s);
      }
      if (/[?&#]debug/.test(location.search + location.hash))
        window.addEventListener('load', openOverlay);
      var taps = [];
      function cornerTap(x, y) {
        if (x > 60 || y > 60) return;
        var now = Date.now();
        taps = taps.filter(function (t) { return now - t < 650; });
        taps.push(now);
        if (taps.length >= 3) { taps = []; openOverlay(); }
      }
      window.addEventListener('touchstart', function (e) {
        var t = e.touches[0]; if (t) cornerTap(t.clientX, t.clientY);
      }, { passive: true, capture: true });
      window.addEventListener('mousedown', function (e) { cornerTap(e.clientX, e.clientY); }, true);
    })();
  </script>
  {{{ SCRIPT }}}
</body>
</html>
